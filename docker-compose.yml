version: '3.8'

services:
  api:
    build: .
    container_name: heypico_maps_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Allows the Docker container to connect to Ollama running on the host machine
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
